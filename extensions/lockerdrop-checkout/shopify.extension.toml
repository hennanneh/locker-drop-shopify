# LockerDrop Checkout UI Extension
# Shows locker pickup options in the checkout flow
# Learn more: https://shopify.dev/docs/apps/build/checkout

api_version = "2025-04"

[[extensions]]
uid = "539482da-e96f-2453-1e78-c274f2e1851605b78716"
type = "ui_extension"
name = "LockerDrop Pickup"
handle = "lockerdrop-checkout"

[[extensions.targeting]]
module = "./src/Checkout.js"
target = "purchase.checkout.block.render"

[extensions.capabilities]
api_access = true
network_access = true
block_progress = true

# Settings exposed to merchant in checkout customizer
[extensions.settings]
  [[extensions.settings.fields]]
  key = "show_expanded"
  type = "boolean"
  name = "Auto expand section"
  description = "Show LockerDrop options expanded by default"

  [[extensions.settings.fields]]
  key = "title"
  type = "single_line_text_field"
  name = "Section title"
  description = "Custom title for the locker pickup section"

  [[extensions.settings.fields]]
  key = "badge_text"
  type = "single_line_text_field"
  name = "Badge text"
  description = "Text shown in the badge next to the title (e.g. FREE, SAVE $5, NEW). Leave blank to hide."

  [[extensions.settings.fields]]
  key = "show_badge"
  type = "boolean"
  name = "Show badge"
  description = "Display a badge next to the section title"

  [[extensions.settings.fields]]
  key = "show_benefits"
  type = "boolean"
  name = "Show benefits tagline"
  description = "Display the benefits text below the title (e.g. Skip delivery fees, Pick up 24/7)"

  [[extensions.settings.fields]]
  key = "benefits_text"
  type = "single_line_text_field"
  name = "Benefits text"
  description = "Custom benefits tagline. Leave blank for default."

  [[extensions.settings.fields]]
  key = "show_availability"
  type = "boolean"
  name = "Show locker availability"
  description = "Display how many lockers are available at each location"

  [[extensions.settings.fields]]
  key = "compact_mode"
  type = "boolean"
  name = "Compact layout"
  description = "Use tighter spacing for a more compact appearance"

