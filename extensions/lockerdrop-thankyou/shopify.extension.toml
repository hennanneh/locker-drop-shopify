api_version = "2025-10"

[[extensions]]
uid = "lockerdrop-thankyou-block"
type = "ui_extension"
name = "LockerDrop Pickup Info"
handle = "lockerdrop-thankyou"

# NO capabilities: no network_access / api_access. Testing whether requesting
# those capabilities was preventing the extension from mounting. This build
# reads everything client-side (no backend fetch). OrderStatus/OrderIndex
# targets temporarily removed while we confirm the Thank You block mounts.
[[extensions.targeting]]
module = "./src/ThankYou.jsx"
target = "purchase.thank-you.block.render"
